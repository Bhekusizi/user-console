<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparky Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── CSS Variables (Sparky Dark v3) ─────────────────────────────────────── */
:root {
  --bg1: #1e2738;
  --bg2: #28334e;
  --bg3: #323f60;
  --bg4: #3c4b70;
  --amber: #e8a838;
  --amber-light: #f0c060;
  --amber-dim: rgba(232,168,56,0.18);
  --amber-glow: rgba(232,168,56,0.10);
  --text-primary: #ffffff;
  --text-secondary: #cdd5e8;
  --text-muted: #adb8cf;
  --icon-color: #7a8ba8;
  --info: #4a9eff;
  --info-dim: rgba(74,158,255,0.12);
  --success: #3ecf8e;
  --success-dim: rgba(62,207,142,0.12);
  --danger: #f06060;
  --danger-dim: rgba(240,96,96,0.12);
  --warn: #f0a030;
  --warn-dim: rgba(240,160,48,0.12);
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}

/* ─── Reset & Base ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  min-height: 100vh;
  background: var(--bg1);
  font-family: 'Lora', serif;
  font-weight: 500;
  color: var(--text-secondary);
}
::selection { background: rgba(232,168,56,0.2); color: var(--text-primary); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
select option { background: var(--bg3); color: var(--text-secondary); }
input::placeholder { color: var(--text-muted); opacity: 0.7; }
button { font-family: inherit; }
a { text-decoration: none; }

/* ─── Fonts ──────────────────────────────────────────────────────────────── */
.font-heading { font-family: 'Syne', sans-serif; }
.font-mono { font-family: 'DM Mono', monospace; }

/* ─── Animations ─────────────────────────────────────────────────────────── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeSlideUp 0.5s ease both; }
.animate-in-d1 { animation: fadeSlideUp 0.5s 60ms ease both; }
.animate-in-d2 { animation: fadeSlideUp 0.5s 120ms ease both; }
.animate-in-d3 { animation: fadeSlideUp 0.5s 180ms ease both; }

/* ─── Top Nav ────────────────────────────────────────────────────────────── */
.top-nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-left, .nav-right { display: flex; align-items: center; gap: 16px; }
.nav-right { gap: 10px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--amber); }
.logo-sub { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 500; color: var(--text-muted); }

/* Tab buttons */
.nav-tabs { display: flex; gap: 2px; margin-left: 8px; }
.tab-btn {
  padding: 8px 14px;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-btn.active { background: var(--amber-dim); color: var(--amber); }
.tab-btn.active svg { stroke: var(--amber); }
.tab-btn:hover:not(.active) { background: rgba(255,255,255,0.04); }

.nav-divider { width: 1px; height: 20px; background: var(--border); margin-left: 4px; }

.blog-link {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.blog-link:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }

/* Icon buttons */
.icon-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  transition: background 0.15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.04); }

.notif-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.notif-btn.open { background: var(--amber-dim); }
.notif-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 9px;
  background: var(--danger);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* User pill */
.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px 6px 6px;
  background: var(--bg3);
  border-radius: 24px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}
.user-pill:hover { border-color: var(--border-hover); }
.user-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #0d1117;
}
.user-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-secondary); }

/* Dropdowns */
.dropdown {
  position: absolute;
  top: 44px;
  right: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  z-index: 200;
  overflow: hidden;
  display: none;
}
.dropdown.open { display: block; }
.dropdown-header {
  padding: 12px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.dropdown-header span { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.dropdown-action {
  background: none;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: var(--amber);
  cursor: pointer;
  font-weight: 600;
}

.notif-dropdown { width: 340px; }
.notif-scroll { max-height: 320px; overflow-y: auto; }
.notif-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  transition: background 0.15s;
}
.notif-item.unread { background: rgba(255,255,255,0.02); }
.notif-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.notif-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); }
.notif-item.read .notif-title { color: var(--text-muted); }
.notif-msg { font-family: 'Lora', serif; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.notif-time { font-family: 'Lora', serif; font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.user-dropdown { width: 200px; padding: 6px 0; }
.user-dropdown-item {
  width: 100%;
  padding: 10px 16px;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-align: left;
}
.user-dropdown-item:hover { background: rgba(255,255,255,0.04); }
.user-dropdown-item.danger { color: var(--danger); }
.dropdown-divider { height: 1px; background: var(--border); margin: 4px 12px; }

/* ─── Main Content ───────────────────────────────────────────────────────── */
.main-content { max-width: 1100px; margin: 0 auto; padding: 24px 24px 80px; }
.tab-content { display: none; }
.tab-content.active { display: flex; flex-direction: column; gap: 20px; }

/* ─── Cards & Panels ─────────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-header {
  padding: 14px 20px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-header-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.card-body { padding: 16px 20px; }

/* ─── Welcome Banner ─────────────────────────────────────────────────────── */
.welcome-banner {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.welcome-glow {
  position: absolute;
  top: -20px;
  right: -20px;
  width: 180px;
  height: 180px;
  background: var(--amber-dim);
  border-radius: 50%;
  filter: blur(60px);
}
.welcome-content { position: relative; }
.welcome-sub { font-family: 'Lora', serif; font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
.welcome-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.welcome-meta { font-family: 'Lora', serif; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.status-dot.active { background: var(--success); }

/* ─── Metric Cards ───────────────────────────────────────────────────────── */
.metrics-row { display: flex; gap: 12px; flex-wrap: wrap; }
.metric-card {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  border-left: 3px solid var(--amber);
  flex: 1 1 0;
  min-width: 140px;
}
.metric-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.metric-value {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.1;
}
.metric-sub { font-family: 'Lora', serif; font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ─── Usage Bars ─────────────────────────────────────────────────────────── */
.usage-section { padding: 20px 22px; }
.usage-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
.usage-row { margin-bottom: 14px; }
.usage-row:last-child { margin-bottom: 0; }
.usage-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
.usage-label-text { font-family: 'Lora', serif; font-size: 12px; color: var(--text-secondary); }
.usage-label-value { font-family: 'DM Mono', monospace; font-size: 12px; }
.progress-track { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

/* ─── Two Column Layout ──────────────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ─── Activity Feed ──────────────────────────────────────────────────────── */
.activity-item {
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  cursor: default;
}
.activity-item:last-child { border-bottom: none; }
.activity-item:hover { background: rgba(255,255,255,0.02); }
.activity-icon { width: 28px; display: flex; justify-content: center; }
.activity-text { flex: 1; min-width: 0; }
.activity-desc { font-family: 'Lora', serif; font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-project { color: var(--text-primary); font-weight: 500; }
.activity-time { font-family: 'Lora', serif; font-size: 11px; color: var(--text-muted); }

/* ─── Quick Launch Grid ──────────────────────────────────────────────────── */
.quick-launch-grid { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.launch-tile {
  background: var(--bg3);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: var(--radius-sm);
  padding: 14px 14px 14px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.launch-tile:hover { background: var(--bg4); }
.launch-icon-wrap {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.launch-tile-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); }
.launch-tile-desc { font-family: 'Lora', serif; font-size: 11px; color: var(--text-muted); }

/* ─── Starred Projects ───────────────────────────────────────────────────── */
.starred-header { display: flex; align-items: center; gap: 6px; }
.view-all-link {
  background: none;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--amber);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.starred-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s;
  margin-bottom: 8px;
}
.starred-item:last-child { margin-bottom: 0; }
.starred-item:hover { border-color: var(--border-hover); }
.starred-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.starred-meta { font-family: 'Lora', serif; font-size: 11px; color: var(--text-muted); }

/* ─── Status Badge ───────────────────────────────────────────────────────── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  white-space: nowrap;
}
.status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.status-badge.complete { background: var(--success-dim); color: var(--success); }
.status-badge.complete .dot { background: var(--success); }
.status-badge.in-progress { background: var(--info-dim); color: var(--info); }
.status-badge.in-progress .dot { background: var(--info); }
.status-badge.draft { background: rgba(255,255,255,0.06); color: var(--text-muted); }
.status-badge.draft .dot { background: var(--text-muted); }

/* ─── Project Cards ──────────────────────────────────────────────────────── */
.project-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s ease;
  overflow: hidden;
}
.project-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.project-card.selected { border-color: rgba(232,168,56,0.27); }
.project-card-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}
.project-card-calc { display: flex; align-items: center; gap: 10px; }
.project-card-calc-name { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.project-card-actions-wrap { display: flex; align-items: center; gap: 8px; }
.star-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  border-radius: 4px;
  transition: background 0.15s;
}
.star-btn:hover { background: rgba(255,255,255,0.06); }
.project-card-body { padding: 14px 18px; }
.project-card-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; line-height: 1.3; }
.project-card-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.project-card-meta span { font-family: 'Lora', serif; font-size: 12px; color: var(--text-muted); }
.project-card-meta .mono { font-family: 'DM Mono', monospace; color: var(--text-secondary); font-weight: 500; }
.report-ready { font-family: 'Syne', sans-serif !important; font-size: 11px !important; font-weight: 600; color: var(--text-muted) !important; display: flex; align-items: center; gap: 4px; }
.project-card-expand {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
}
.project-card.selected .project-card-expand { max-height: 120px; }
.project-card-expand-inner {
  padding: 0 18px 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
}
.btn-primary { background: var(--amber); color: #0d1117; font-weight: 700; }
.btn-primary:hover { background: var(--amber-light); box-shadow: 0 0 16px var(--amber-glow); }
.btn-secondary { background: var(--bg3); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--bg4); }
.btn-danger { background: var(--danger-dim); color: var(--danger); }
.btn-danger:hover { background: rgba(240,96,96,0.18); }
.btn-outline-danger { background: transparent; border: 1px solid rgba(240,96,96,0.2); color: var(--danger); }
.btn-outline-border { background: var(--bg3); border: 1px solid var(--border); color: var(--text-secondary); }

/* ─── Toolbar ────────────────────────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 14px 18px;
  border: 1px solid var(--border);
}
.search-wrap { flex: 1 1 200px; position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Lora', serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: rgba(232,168,56,0.33); }
.filter-segments {
  display: flex;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}
.filter-btn {
  padding: 8px 14px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { background: var(--amber-dim); color: var(--amber); }
.sort-group { display: flex; align-items: center; gap: 2px; }
.sort-select {
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  color: var(--text-secondary);
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  border-right: none;
}
.sort-dir-btn {
  padding: 7px 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: background 0.15s;
}
.sort-dir-btn:hover { background: var(--bg4); }
.star-filter-btn {
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
}

          ${unreadCount > 0 ? `<span class="notif-badge">${unreadCount}</span>` : ''}
        </button>
        <div class="dropdown notif-dropdown ${state.showNotifications?'open':''}" id="notif-dropdown">
          <div class="dropdown-header">
            <span>Notifications</span>
            ${unreadCount > 0 ? '<button class="dropdown-action" id="mark-all-read">Mark all read</button>' : ''}
          </div>
          <div class="notif-scroll">
            ${notifications.map(n => {
              const dotColor = n.read ? 'transparent' : (n.type==='info'?'var(--info)':n.type==='success'?'var(--success)':'var(--warn)');
              const dotBorder = n.read ? 'border:1px solid var(--border)' : '';
              return `<div class="notif-item ${n.read?'read':'unread'}">
                <div class="notif-dot" style="background:${dotColor};${dotBorder}"></div>
                <div>
                  <div class="notif-title">${n.title}</div>
                  <div class="notif-msg">${n.message}</div>
                  <div class="notif-time">${n.time}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div style="position:relative" id="user-wrap">
        <div class="user-pill" id="user-toggle">
          <div class="user-avatar">${USER.avatar}</div>
          <span class="user-name">${USER.name.split(' ')[0]}</span>
          ${icon('chevronDown',12)}
        </div>
        <div class="dropdown user-dropdown ${state.showUserMenu?'open':''}" id="user-dropdown">
          <button class="user-dropdown-item" data-tab="account">${icon('user',14)} Account Settings</button>
          <button class="user-dropdown-item">${icon('helpCircle',14)} Help & Support</button>
          <button class="user-dropdown-item">${icon('externalLink',14)} Documentation</button>
          <div class="dropdown-divider"></div>
          <button class="user-dropdown-item danger">${icon('logOut',14,'#f06060')} Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MOBILE TABS -->
  <div class="mobile-tabs">
    ${['dashboard','projects','calculators','account'].map(id => {
      const labels = {dashboard:'Dashboard',projects:'My Projects',calculators:'Calculators',account:'Account'};
      const icons_map = {dashboard:'grid',projects:'folder',calculators:'zap',account:'user'};
      const isActive = state.activeTab === id;
      return `<button class="mobile-tab ${isActive?'active':''}" data-tab="${id}">${icon(icons_map[id],18,isActive?'#e8a838':IC)}<span class="mobile-tab-label">${labels[id]}</span></button>`;
    }).join('')}
    <a href="/blog" class="mobile-tab">${icon('bookOpen',18)}<span class="mobile-tab-label">Blog</span></a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="tab-content ${state.activeTab==='dashboard'?'active':''}" id="tab-dashboard">${renderDashboard()}</div>
    <div class="tab-content ${state.activeTab==='projects'?'active':''}" id="tab-projects">${renderProjects()}</div>
    <div class="tab-content ${state.activeTab==='calculators'?'active':''}" id="tab-calculators">${renderCalculators()}</div>
    <div class="tab-content ${state.activeTab==='account'?'active':''}" id="tab-account">${renderAccount()}</div>
  </div>`;

  attachEvents();
}

// ─── Tab Renderers ───────────────────────────────────────────────────────────
function renderDashboard() {
  const projColor = usageColor(USER.projectsUsed, USER.projectsLimit);
  const storColor = usageColor(USER.storageUsed, USER.storageLimit);
  const reportCount = projects.filter(p=>p.hasReport).length;
  const starred = projects.filter(p=>p.starred);

  return `
  <div class="welcome-banner animate-in">
    <div class="welcome-glow"></div>
    <div class="welcome-content">
      <div class="welcome-sub">Welcome back,</div>
      <div class="welcome-name">${USER.name}</div>
      <div class="welcome-meta"><span class="status-dot active"></span> ${USER.plan} Plan — Member since ${fmtDate(USER.memberSince)}</div>
    </div>
  </div>

  <div class="metrics-row">
    <div class="metric-card animate-in" style="border-left-color:${projColor}">
      <div class="metric-label">${icon('folder',14)} Projects</div>
      <div class="metric-value">${USER.projectsUsed}</div>
      <div class="metric-sub">of ${USER.projectsLimit} available</div>
    </div>
    <div class="metric-card animate-in-d1" style="border-left-color:var(--info)">
      <div class="metric-label">${icon('zap',14)} This Month</div>
      <div class="metric-value">${USER.calculationsThisMonth}</div>
      <div class="metric-sub">calculations</div>
    </div>
    <div class="metric-card animate-in-d2" style="border-left-color:var(--success)">
      <div class="metric-label">${icon('file',14)} Reports</div>
      <div class="metric-value">${reportCount}</div>
      <div class="metric-sub">generated</div>
    </div>
    <div class="metric-card animate-in-d3" style="border-left-color:${storColor}">
      <div class="metric-label">${icon('database',14)} Storage</div>
      <div class="metric-value">${USER.storageUsed}MB</div>
      <div class="metric-sub">of ${USER.storageLimit}MB</div>
    </div>
  </div>

  <div class="card">
    <div class="usage-section">
      <div class="usage-title">Usage Overview</div>
      ${[
        {label:'Projects',val:`${USER.projectsUsed} / ${USER.projectsLimit}`,v:USER.projectsUsed,m:USER.projectsLimit},
        {label:'Storage',val:`${USER.storageUsed}MB / ${USER.storageLimit}MB`,v:USER.storageUsed,m:USER.storageLimit},
      ].map(r => {
        const c = usageColor(r.v,r.m);
        return `<div class="usage-row">
          <div class="usage-labels">
            <span class="usage-label-text">${r.label}</span>
            <span class="usage-label-value" style="color:${c}">${r.val}</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct(r.v,r.m)}%;background:${c}"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-header"><span class="card-header-title">Recent Activity</span></div>
      <div style="padding:6px 0">
        ${activity.map(a => `
          <div class="activity-item">
            <div class="activity-icon">${icon(a.iconKey,16)}</div>
            <div class="activity-text">
              <div class="activity-desc">${a.action} — <span class="activity-project">${a.project}</span></div>
              <div class="activity-time">${a.time}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-header-title">Quick Launch</span></div>
      <div class="quick-launch-grid">
        ${CALCULATORS.map(c => `
          <button class="launch-tile" style="border-left:3px solid ${c.color}44" data-calc="${c.id}"
            onmouseenter="this.style.borderTopColor='${c.color}55';this.style.borderRightColor='${c.color}55';this.style.borderBottomColor='${c.color}55';this.style.borderLeftColor='${c.color}';this.style.background='var(--bg4)'"
            onmouseleave="this.style.borderTopColor='';this.style.borderRightColor='';this.style.borderBottomColor='';this.style.borderLeftColor='${c.color}44';this.style.background=''">
            <div class="launch-icon-wrap" style="background:${c.color}12">${icon(c.iconKey,18)}</div>
            <div><div class="launch-tile-name">${c.name}</div><div class="launch-tile-desc">${c.desc}</div></div>
          </button>`).join('')}
      </div>
    </div>
  </div>

  ${starred.length > 0 ? `
  <div class="card">
    <div class="card-header">
      <span class="card-header-title starred-header">${icon('starFilled',14,'#e8a838')} Starred Projects</span>
      <button class="view-all-link" id="view-all-starred">View All ${icon('arrowRight',12,'#e8a838')}</button>
    </div>
    <div style="padding:12px">
      ${starred.map(p => {
        const c = calcMap[p.calculator];
        return `<div class="starred-item">
          ${icon(c?.iconKey,16)}
          <div style="flex:1;min-width:0">
            <div class="starred-name">${p.name}</div>
            <div class="starred-meta">${c?.name} · ${p.circuits} circuits · Updated ${fmtDateTime(p.updated)}</div>
          </div>
          ${statusBadge(p.status)}
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}`;
}

function renderProjects() {
  const filtered = getFilteredProjects();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  if (state.currentPage > totalPages) state.currentPage = totalPages;
  const paginated = filtered.slice((state.currentPage-1)*PER_PAGE, state.currentPage*PER_PAGE);

  return `
  <div class="toolbar">
    <div class="search-wrap">
      ${icon('search',14)}
      <input class="search-input" type="text" placeholder="Search projects..." value="${state.searchQuery}" id="search-input">
    </div>
    <div class="filter-segments">
      ${[['all','All'],['complete','Complete'],['in-progress','In Progress'],['draft','Draft']].map(([v,l]) =>
        `<button class="filter-btn ${state.projectFilter===v?'active':''}" data-filter="${v}">${l}</button>`
      ).join('')}
    </div>
    <div class="sort-group">
      <select class="sort-select" id="sort-select">
        <option value="updated" ${state.sortBy==='updated'?'selected':''}>Last Updated</option>
        <option value="name" ${state.sortBy==='name'?'selected':''}>Name</option>
        <option value="circuits" ${state.sortBy==='circuits'?'selected':''}>Circuits</option>
      </select>
      <button class="sort-dir-btn" id="sort-dir-btn">${state.sortDir==='desc'?icon('chevronDown',14):icon('chevronUp',14)}</button>
    </div>
    <button class="star-filter-btn ${state.starredFilter?'active':''}" id="star-filter-btn">
      ${state.starredFilter ? icon('starFilled',14,'#e8a838') : icon('star',14)}
    </button>
    <button class="new-project-btn">${icon('plus',14,'#0d1117')} New Project</button>
  </div>

  <div class="results-info">
    <span>Showing <span class="results-count">${filtered.length}</span> project${filtered.length!==1?'s':''}</span>
    ${totalPages > 1 ? `<span class="page-info">Page ${state.currentPage} of ${totalPages}</span>` : ''}
  </div>

  <div style="display:flex;flex-direction:column;gap:10px">
    ${paginated.length === 0 ? (
      filtered.length === 0 && !state.searchQuery && state.projectFilter === 'all' && !state.starredFilter
        ? `<div class="card empty-state">
            <div style="margin-bottom:16px;display:flex;justify-content:center">${icon('rocket',40)}</div>
            <div class="empty-state-title">No projects yet</div>
            <div class="empty-state-msg">Create your first project by selecting a calculator and entering your circuit details.</div>
            <button class="btn btn-primary" data-tab="calculators" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;font-size:13px">${icon('plus',14,'#0d1117')} Create First Project</button>
          </div>`
        : `<div class="card" style="padding:48px 20px;text-align:center">
            <div style="margin-bottom:12px;display:flex;justify-content:center">${icon('search',32)}</div>
            <div style="font-family:Syne,sans-serif;font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:6px">No matching projects</div>
            <div style="font-size:13px;color:var(--text-muted)">Try adjusting your search or filters.</div>
          </div>`
    ) : paginated.map((p,i) => {
      const c = calcMap[p.calculator];
      const sel = state.selectedProjectId === p.id;
      return `<div class="project-card ${sel?'selected':''}" data-project-id="${p.id}" style="animation:fadeSlideUp 0.4s ${i*50}ms ease both">
        <div class="project-card-header">
          <div class="project-card-calc">${icon(c?.iconKey,16)} <span class="project-card-calc-name">${c?.name}</span></div>
          <div class="project-card-actions-wrap">
            ${statusBadge(p.status)}
            <button class="star-btn" data-star-id="${p.id}">${p.starred ? icon('starFilled',16,'#e8a838') : icon('star',16)}</button>
          </div>
        </div>
        <div class="project-card-body">
          <div class="project-card-name">${p.name}</div>
          <div class="project-card-meta">
            <span><span class="mono">${p.circuits}</span> circuits</span>
            <span>Updated ${fmtDateTime(p.updated)}</span>
            ${p.hasReport ? `<span class="report-ready">${icon('file',13)} Report ready</span>` : ''}
          </div>
        </div>
        <div class="project-card-expand">
          <div class="project-card-expand-inner">
            <button class="btn btn-primary">Open</button>
            <button class="btn btn-secondary">Duplicate</button>
            <button class="btn btn-secondary">Export PDF</button>
            <button class="btn btn-secondary">Share</button>
            <button class="btn btn-danger">Delete</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>

  ${totalPages > 1 ? `
  <div class="pagination">
    <button class="page-btn" id="page-prev" ${state.currentPage===1?'disabled':''}>Prev</button>
    ${Array.from({length:totalPages},(_,i)=>i+1).map(p =>
      `<button class="page-num ${p===state.currentPage?'active':''}" data-page="${p}">${p}</button>`
    ).join('')}
    <button class="page-btn" id="page-next" ${state.currentPage===totalPages?'disabled':''}>Next</button>
  </div>` : ''}`;
}

  return `
  <div style="font-size:14px;color:var(--text-secondary)">Launch a calculator to start a new project or continue an existing one.</div>
  <div class="calc-grid">
    ${CALCULATORS.map((c,i) => {
      const pc = projects.filter(p=>p.calculator===c.id).length;
      return `<div class="calc-card" style="animation:fadeSlideUp 0.4s ${i*70}ms ease both">
        <div class="calc-card-top">
          <div class="calc-icon-wrap">${icon(c.iconKey,22)}</div>
          <div><div class="calc-card-name">${c.name}</div><div class="calc-card-desc">${c.desc}</div></div>
        </div>
        <div class="calc-card-bottom">
          <span class="calc-card-count">${pc} project${pc!==1?'s':''}</span>
          <button class="btn btn-primary" style="font-size:11px;display:flex;align-items:center;gap:4px">Launch ${icon('arrowRight',12,'#0d1117')}</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

  <div class="card profile-card">
    <div class="profile-avatar">${USER.avatar}</div>
    <div class="profile-info">

      <div class="profile-email">${USER.email}</div>

  <div class="card">

        {name:'Professional',price:'$49',projects:50,storage:'500MB',calcs:'Unlimited',reports:'Full PDF + Share',current:true},

  <div class="card">
    <div class="card-header"><span class="card-header-title">Preferences</span></div>
    <div style="padding:16px 22px">
      ${[
        {label:'Default Standard',value:'AS/NZS 3008:2017',desc:'Applied to new cable sizing projects'},
        {label:'Report Format',value:'Teal Professional',desc:'PDF export template style'},
        {label:'Unit System',value:'Metric (SI)',desc:'Default measurement units'},
        {label:'Email Notifications',value:'Enabled',desc:'Project updates and billing alerts'},
      ].map(p => `
        <div class="pref-row">
          <div><div class="pref-label">${p.label}</div><div class="pref-desc">${p.desc}</div></div>
          <div class="pref-actions"><span class="pref-value">${p.value}</span><button class="pref-edit-btn">Edit</button></div>
        </div>`).join('')}
    </div>
  </div>`;

// ─── Event Binding ───────────────────────────────────────────────────────────
function attachEvents() {
  // Tab switching (desktop + mobile + dropdown)
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeTab = btn.dataset.tab;
      state.selectedProjectId = null;
      state.showUserMenu = false;
      state.showNotifications = false;
      render();
    });
  });

  // Notifications toggle
  document.getElementById('notif-toggle')?.addEventListener('click', e => {
    e.stopPropagation();
    state.showNotifications = !state.showNotifications;
    state.showUserMenu = false;
    render();
  });

  // Mark all read
  document.getElementById('mark-all-read')?.addEventListener('click', e => {
    e.stopPropagation();
    notifications = notifications.map(n => ({...n, read: true}));
    render();
  });

  // User menu toggle
  document.getElementById('user-toggle')?.addEventListener('click', e => {
    e.stopPropagation();
    state.showUserMenu = !state.showUserMenu;
    state.showNotifications = false;
    render();
  });

  // Close dropdowns on outside click
  document.addEventListener('click', () => {
    if (state.showNotifications || state.showUserMenu) {
      state.showNotifications = false;
      state.showUserMenu = false;
      render();
    }
  });

  // Prevent dropdown close when clicking inside
  document.getElementById('notif-dropdown')?.addEventListener('click', e => e.stopPropagation());
  document.getElementById('user-dropdown')?.addEventListener('click', e => e.stopPropagation());

  // View all starred
  document.getElementById('view-all-starred')?.addEventListener('click', () => {
    state.activeTab = 'projects';
    state.starredFilter = true;
    render();
  });

  // Search
  document.getElementById('search-input')?.addEventListener('input', e => {
    state.searchQuery = e.target.value;
    state.currentPage = 1;
    render();
    // Restore focus and cursor position
    const input = document.getElementById('search-input');
    if (input) { input.focus(); input.selectionStart = input.selectionEnd = e.target.selectionStart; }
  });

  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.projectFilter = btn.dataset.filter;
      state.currentPage = 1;
      render();
    });
  });

  // Sort
  document.getElementById('sort-select')?.addEventListener('change', e => {
    state.sortBy = e.target.value;
    state.currentPage = 1;
    render();
  });
  document.getElementById('sort-dir-btn')?.addEventListener('click', () => {
    state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
    state.currentPage = 1;
    render();
  });

  // Star filter
  document.getElementById('star-filter-btn')?.addEventListener('click', () => {
    state.starredFilter = !state.starredFilter;
    state.currentPage = 1;
    render();
  });

  // Project cards — expand
  document.querySelectorAll('[data-project-id]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.star-btn') || e.target.closest('.btn')) return;
      const id = parseInt(card.dataset.projectId);
      state.selectedProjectId = state.selectedProjectId === id ? null : id;
      render();
    });
  });

  // Star toggle
  document.querySelectorAll('[data-star-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.starId);
      projects = projects.map(p => p.id === id ? {...p, starred: !p.starred} : p);
      render();
    });
  });

  // Pagination
  document.getElementById('page-prev')?.addEventListener('click', () => {
    if (state.currentPage > 1) { state.currentPage--; render(); }
  });
  document.getElementById('page-next')?.addEventListener('click', () => {
    const filtered = getFilteredProjects();
    const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
    if (state.currentPage < totalPages) { state.currentPage++; render(); }
  });
  document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.currentPage = parseInt(btn.dataset.page);
      render();
    });
  });
}

// ─── Init ────────────────────────────────────────────────────────────────────
render();
</script>
